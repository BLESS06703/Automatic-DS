<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bless Auto Care - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <div class="border-b border-gray-200 bg-white px-6 py-4">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-xl font-semibold text-gray-800">Bless Auto Care</h1>
                <p class="text-xs text-gray-500">Professional Diagnostic System</p>
            </div>
            <button onclick="logout()" class="text-red-500 text-sm hover:text-red-600">Logout</button>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-6 py-8">
        <!-- Stats Row - Clean numbers -->
        <div class="grid grid-cols-4 gap-8 mb-10 text-center">
            <div>
                <div class="text-3xl font-bold text-gray-800" id="statCustomers">0</div>
                <div class="text-xs text-gray-400 uppercase tracking-wide mt-1">CUSTOMERS</div>
            </div>
            <div>
                <div class="text-3xl font-bold text-gray-800" id="statVehicles">0</div>
                <div class="text-xs text-gray-400 uppercase tracking-wide mt-1">VEHICLES</div>
            </div>
            <div>
                <div class="text-3xl font-bold text-gray-800" id="statDiagnostics">0</div>
                <div class="text-xs text-gray-400 uppercase tracking-wide mt-1">DIAGNOSTICS</div>
            </div>
            <div>
                <div class="text-3xl font-bold text-gray-800" id="statRevenue">MK 0</div>
                <div class="text-xs text-gray-400 uppercase tracking-wide mt-1">REVENUE</div>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="flex gap-1 mb-8 border-b border-gray-200">
            <button onclick="switchTab('diagnostic')" id="tabDiagnostic" class="px-6 py-2 text-sm font-medium text-[#003153] border-b-2 border-[#003153]">Diagnostic</button>
            <button onclick="switchTab('vehicles')" id="tabVehicles" class="px-6 py-2 text-sm font-medium text-gray-500 hover:text-gray-700">Vehicles</button>
            <button onclick="switchTab('history')" id="tabHistory" class="px-6 py-2 text-sm font-medium text-gray-500 hover:text-gray-700">History</button>
            <button onclick="switchTab('analytics')" id="tabAnalytics" class="px-6 py-2 text-sm font-medium text-gray-500 hover:text-gray-700">Analytics</button>
        </div>

        <!-- Diagnostic Tab Content -->
        <div id="diagnosticContent" class="grid md:grid-cols-2 gap-6">
            <!-- Left Panel -->
            <div>
                <h2 class="text-md font-semibold text-gray-800 mb-4">Diagnostic Controls</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-2">Select System</label>
                        <select id="systemSelect" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                            <option value="engine">Engine Diagnostic</option>
                            <option value="battery">Battery & Charging</option>
                            <option value="starter">Starter System</option>
                        </select>
                    </div>
                    <div id="questionsPanel" class="space-y-3"></div>
                    <div class="flex gap-3 pt-2">
                        <button onclick="runDiagnostic()" class="flex-1 bg-[#003153] text-white py-2 rounded-lg text-sm font-medium">Start Diagnosis</button>
                        <button onclick="cancelDiagnostic()" class="flex-1 border border-gray-200 text-gray-600 py-2 rounded-lg text-sm font-medium hover:bg-gray-50">Cancel</button>
                    </div>
                </div>
            </div>

            <!-- Right Panel - Results -->
            <div>
                <h2 class="text-md font-semibold text-gray-800 mb-4">Analysis Results</h2>
                <div id="resultsPanel" class="min-h-[300px] bg-gray-50 rounded-lg p-6">
                    <div class="text-center text-gray-400">
                        <div class="text-4xl mb-2">🔍</div>
                        <p class="text-sm">Select a system and run diagnosis</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Vehicles Tab Content -->
        <div id="vehiclesContent" class="hidden">
            <div class="bg-gray-50 rounded-lg p-8 text-center">
                <div class="text-4xl mb-3">🚙</div>
                <p class="text-gray-500">No vehicles added yet</p>
                <button class="mt-4 bg-[#003153] text-white px-4 py-2 rounded-lg text-sm">+ Add Vehicle</button>
            </div>
        </div>

        <!-- History Tab Content -->
        <div id="historyContent" class="hidden">
            <div id="historyList" class="space-y-3">
                <div class="bg-gray-50 rounded-lg p-8 text-center">
                    <div class="text-4xl mb-3">📜</div>
                    <p class="text-gray-500">No diagnostic history yet</p>
                </div>
            </div>
        </div>

        <!-- Analytics Tab Content -->
        <div id="analyticsContent" class="hidden">
            <div class="bg-gray-50 rounded-lg p-8 text-center">
                <div class="text-4xl mb-3">📊</div>
                <p class="text-gray-500">Analytics coming soon</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let currentSystem = 'engine';
        let isLoading = false;
        let diagnosticHistory = [];

        async function checkAuth() {
            try {
                const res = await fetch(`${API_BASE}/api/check-auth`);
                const data = await res.json();
                if (!data.authenticated) window.location.href = '/login.html';
            } catch(e) { window.location.href = '/login.html'; }
        }

        function switchTab(tab) {
            // Hide all contents
            document.getElementById('diagnosticContent').classList.add('hidden');
            document.getElementById('vehiclesContent').classList.add('hidden');
            document.getElementById('historyContent').classList.add('hidden');
            document.getElementById('analyticsContent').classList.add('hidden');
            
            // Show selected content
            document.getElementById(`${tab}Content`).classList.remove('hidden');
            
            // Update tab styles
            const tabs = ['diagnostic', 'vehicles', 'history', 'analytics'];
            tabs.forEach(t => {
                const btn = document.getElementById(`tab${t.charAt(0).toUpperCase() + t.slice(1)}`);
                if (t === tab) {
                    btn.className = 'px-6 py-2 text-sm font-medium text-[#003153] border-b-2 border-[#003153]';
                } else {
                    btn.className = 'px-6 py-2 text-sm font-medium text-gray-500 hover:text-gray-700';
                }
            });
            
            if (tab === 'history') loadHistory();
        }

        function loadQuestions() {
            const questions = {
                engine: `
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Engine overheating?</label>
                    <select id="q_overheating" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Smoke from exhaust?</label>
                    <select id="q_smoke" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Unusual engine noise?</label>
                    <select id="q_noise" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Check engine light ON?</label>
                    <select id="q_check_light" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                `,
                battery: `
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Car fails to start?</label>
                    <select id="q_start" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Dashboard lights dim?</label>
                    <select id="q_lights" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Rapid clicking?</label>
                    <select id="q_clicks" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Battery over 3 years?</label>
                    <select id="q_age" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                `,
                starter: `
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Clicking when turning key?</label>
                    <select id="q_click" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Engine cranks?</label>
                    <select id="q_crank" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Headlights work?</label>
                    <select id="q_lights" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="yes">Yes</option><option value="no">No</option></select></div>
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Burning smell?</label>
                    <select id="q_smell" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                `
            };
            document.getElementById('questionsPanel').innerHTML = questions[currentSystem];
        }

        function cancelDiagnostic() {
            if (isLoading) return;
            document.getElementById('resultsPanel').innerHTML = `
                <div class="text-center text-gray-400">
                    <div class="text-4xl mb-2">🔍</div>
                    <p class="text-sm">Select a system and run diagnosis</p>
                </div>
            `;
        }

        async function runDiagnostic() {
            if (isLoading) return;

            const symptoms = {};
            document.querySelectorAll('#questionsPanel select').forEach(input => {
                const key = input.id.replace('q_', '');
                symptoms[key] = input.value;
            });

            const resultsPanel = document.getElementById('resultsPanel');
            isLoading = true;
            resultsPanel.innerHTML = '<div class="text-center py-8"><div class="inline-block animate-spin rounded-full h-6 w-6 border-b-2 border-[#003153]"></div><p class="mt-2 text-sm">Analyzing...</p></div>';

            try {
                const res = await fetch(`${API_BASE}/api/diagnose/${currentSystem}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symptoms })
                });
                const result = await res.json();

                const severityColors = {
                    low: 'bg-green-100 text-green-800',
                    medium: 'bg-yellow-100 text-yellow-800',
                    high: 'bg-red-100 text-red-800'
                };

                // Save to history
                const historyItem = {
                    id: Date.now(),
                    type: currentSystem,
                    date: new Date().toLocaleString(),
                    severity: result.severity,
                    results: result.results
                };
                diagnosticHistory.unshift(historyItem);
                localStorage.setItem('diagnosticHistory', JSON.stringify(diagnosticHistory));

                resultsPanel.innerHTML = `
                    <div class="space-y-3">
                        <div class="p-3 rounded-lg ${severityColors[result.severity] || 'bg-gray-100'}">
                            <span class="text-xs font-medium">Severity:</span>
                            <span class="text-sm font-semibold ml-1">${result.severity?.toUpperCase() || 'MEDIUM'}</span>
                        </div>
                        <div class="p-3 bg-gray-50 rounded-lg">
                            <p class="text-sm text-gray-700">${result.results || 'No issues found'}</p>
                        </div>
                        <div class="flex gap-2 pt-2">
                            <button onclick="runDiagnostic()" class="flex-1 bg-[#003153] text-white py-1.5 rounded text-xs">Run Again</button>
                            <button onclick="cancelDiagnostic()" class="flex-1 border border-gray-200 text-gray-600 py-1.5 rounded text-xs">Clear</button>
                        </div>
                    </div>
                `;
                loadStats();
            } catch(e) {
                resultsPanel.innerHTML = '<div class="text-center py-8 text-red-500 text-sm">Error. Please try again.</div>';
            } finally {
                isLoading = false;
            }
        }

        function loadHistory() {
            const saved = localStorage.getItem('diagnosticHistory');
            if (saved) diagnosticHistory = JSON.parse(saved);
            
            const historyDiv = document.getElementById('historyList');
            if (diagnosticHistory.length === 0) {
                historyDiv.innerHTML = '<div class="bg-gray-50 rounded-lg p-8 text-center"><div class="text-4xl mb-3">📜</div><p class="text-gray-500">No diagnostic history yet</p></div>';
                return;
            }
            
            historyDiv.innerHTML = diagnosticHistory.map(h => `
                <div class="bg-gray-50 rounded-lg p-4">
                    <div class="flex justify-between items-start mb-2">
                        <span class="font-medium text-sm">${h.type.toUpperCase()} Diagnostic</span>
                        <span class="text-xs text-gray-400">${h.date}</span>
                    </div>
                    <p class="text-sm text-gray-600">${h.results.substring(0, 100)}...</p>
                    <span class="inline-block mt-2 px-2 py-0.5 text-xs rounded ${h.severity === 'high' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">${h.severity}</span>
                </div>
            `).join('');
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API_BASE}/api/statistics`);
                const stats = await res.json();
                document.getElementById('statCustomers').textContent = stats.total_customers || 0;
                document.getElementById('statVehicles').textContent = stats.total_vehicles || 0;
                document.getElementById('statDiagnostics').textContent = stats.total_diagnostics || 0;
                document.getElementById('statRevenue').textContent = `MK ${stats.total_revenue || 0}`;
            } catch(e) {}
        }

        async function logout() {
            await fetch(`${API_BASE}/api/logout`, { method: 'POST' });
            window.location.href = '/login.html';
        }

        document.getElementById('systemSelect').addEventListener('change', (e) => {
            currentSystem = e.target.value;
            loadQuestions();
            cancelDiagnostic();
        });

        checkAuth();
        loadQuestions();
        loadStats();
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
