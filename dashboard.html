<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bless Auto Care - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Top Bar -->
    <div class="bg-white border-b border-gray-200 px-6 py-4">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="text-3xl">🚗</div>
                <div>
                    <h1 class="text-xl font-bold text-[#003153]">Bless Auto Care</h1>
                    <p class="text-xs text-gray-500">Industrial Diagnostic System</p>
                </div>
            </div>
            <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-red-600">Logout</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-6 py-6">
        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="text-center">
                <div class="text-3xl mb-1">👥</div>
                <div class="text-2xl font-bold text-[#003153]" id="statCustomers">0</div>
                <div class="text-xs text-gray-500">Customers</div>
            </div>
            <div class="text-center">
                <div class="text-3xl mb-1">🚙</div>
                <div class="text-2xl font-bold text-[#003153]" id="statVehicles">0</div>
                <div class="text-xs text-gray-500">Vehicles</div>
            </div>
            <div class="text-center">
                <div class="text-3xl mb-1">🔧</div>
                <div class="text-2xl font-bold text-[#003153]" id="statDiagnostics">0</div>
                <div class="text-xs text-gray-500">Diagnostics</div>
            </div>
            <div class="text-center">
                <div class="text-3xl mb-1">💰</div>
                <div class="text-2xl font-bold text-[#003153]" id="statRevenue">$0</div>
                <div class="text-xs text-gray-500">Revenue</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="grid lg:grid-cols-2 gap-6">
            <!-- Controls Panel -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">Diagnostic Controls</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Select System</label>
                        <select id="systemSelect" class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm">
                            <option value="engine">🔧 Engine Diagnostic</option>
                            <option value="battery">🔋 Battery & Charging</option>
                            <option value="starter">⚡ Starter System</option>
                        </select>
                    </div>
                    <div id="questionsPanel" class="space-y-4">
                        <!-- Dynamic questions -->
                    </div>
                    <div class="flex gap-3 pt-2">
                        <button onclick="runDiagnostic()" class="flex-1 bg-[#003153] text-white py-2 rounded-lg font-medium hover:bg-[#1B4F72] transition">Start Diagnosis</button>
                        <button onclick="cancelDiagnostic()" class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg font-medium hover:bg-gray-300 transition">Cancel</button>
                    </div>
                </div>
            </div>

            <!-- Results Panel -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">Analysis Results</h2>
                <div id="resultsPanel" class="min-h-[350px]">
                    <div class="text-center text-gray-400 py-12">
                        <div class="text-5xl mb-3">🔍</div>
                        <p class="text-sm">Select a system and run diagnosis</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let currentSystem = 'engine';
        let isLoading = false;

        async function checkAuth() {
            try {
                const res = await fetch(`${API_BASE}/api/check-auth`);
                const data = await res.json();
                if (!data.authenticated) {
                    window.location.href = '/login.html';
                }
            } catch(e) {
                window.location.href = '/login.html';
            }
        }

        function loadQuestions() {
            const questions = {
                engine: `
                    <div><label class="block text-sm font-medium text-gray-700 mb-2">Engine overheating?</label>
                    <select id="q_overheating" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-2">Smoke from exhaust?</label>
                    <select id="q_smoke" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-2">Unusual engine noise?</label>
                    <select id="q_noise" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-2">Check engine light ON?</label>
                    <select id="q_check_light" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                `,
                battery: `
                    <div><label class="block text-sm font-medium text-gray-700 mb-2">Car fails to start?</label>
                    <select id="q_start" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-2">Dashboard lights dim?</label>
                    <select id="q_lights" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-2">Rapid clicking?</label>
                    <select id="q_clicks" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-2">Battery over 3 years?</label>
                    <select id="q_age" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                `,
                starter: `
                    <div><label class="block text-sm font-medium text-gray-700 mb-2">Clicking when turning key?</label>
                    <select id="q_click" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-2">Engine cranks?</label>
                    <select id="q_crank" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-2">Headlights work?</label>
                    <select id="q_lights" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option value="yes">Yes</option><option value="no">No</option></select></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-2">Burning smell?</label>
                    <select id="q_smell" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"><option value="no">No</option><option value="yes">Yes</option></select></div>
                `
            };
            document.getElementById('questionsPanel').innerHTML = questions[currentSystem];
        }

        function cancelDiagnostic() {
            if (isLoading) return;
            document.getElementById('resultsPanel').innerHTML = `
                <div class="text-center text-gray-400 py-12">
                    <div class="text-5xl mb-3">🔍</div>
                    <p class="text-sm">Diagnostic cancelled. Select a system and run again.</p>
                </div>
            `;
        }

        async function runDiagnostic() {
            if (isLoading) return;

            const symptoms = {};
            document.querySelectorAll('#questionsPanel select').forEach(input => {
                const key = input.id.replace('q_', '');
                symptoms[key] = input.value;
            });

            const resultsPanel = document.getElementById('resultsPanel');
            isLoading = true;
            resultsPanel.innerHTML = '<div class="text-center py-12"><div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-[#003153]"></div><p class="mt-3 text-sm">Analyzing...</p></div>';

            try {
                const res = await fetch(`${API_BASE}/api/diagnose/${currentSystem}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symptoms })
                });
                const result = await res.json();

                const severityColors = {
                    low: 'bg-green-100 text-green-800',
                    medium: 'bg-yellow-100 text-yellow-800',
                    high: 'bg-red-100 text-red-800'
                };

                resultsPanel.innerHTML = `
                    <div class="space-y-3">
                        <div class="p-3 rounded-lg ${severityColors[result.severity] || 'bg-gray-100'}">
                            <strong class="text-sm">Severity:</strong> ${result.severity?.toUpperCase() || 'MEDIUM'}
                        </div>
                        <div class="p-3 bg-gray-50 rounded-lg">
                            <strong class="text-sm">Analysis:</strong>
                            <p class="text-sm mt-1">${result.results || 'No issues found'}</p>
                        </div>
                        <div class="flex gap-2 pt-2">
                            <button onclick="runDiagnostic()" class="flex-1 bg-[#003153] text-white py-2 rounded-lg text-sm">Run Again</button>
                            <button onclick="cancelDiagnostic()" class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg text-sm">Clear</button>
                        </div>
                    </div>
                `;
            } catch(e) {
                resultsPanel.innerHTML = '<div class="text-center py-12 text-red-500 text-sm">Error. Please try again.</div>';
            } finally {
                isLoading = false;
            }
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API_BASE}/api/statistics`);
                const stats = await res.json();
                document.getElementById('statCustomers').textContent = stats.total_customers || 0;
                document.getElementById('statVehicles').textContent = stats.total_vehicles || 0;
                document.getElementById('statDiagnostics').textContent = stats.total_diagnostics || 0;
                document.getElementById('statRevenue').textContent = `$${stats.total_revenue || 0}`;
            } catch(e) {}
        }

        async function logout() {
            await fetch(`${API_BASE}/api/logout`, { method: 'POST' });
            window.location.href = '/login.html';
        }

        document.getElementById('systemSelect').addEventListener('change', (e) => {
            currentSystem = e.target.value;
            loadQuestions();
            cancelDiagnostic();
        });

        checkAuth();
        loadQuestions();
        loadStats();
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
