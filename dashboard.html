<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bless Auto Care - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e0e5ec;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        /* Neumorphism Classes */
        .neumorph {
            background: #e0e5ec;
            box-shadow: -10px -10px 20px rgba(255,255,255,0.8), 10px 10px 20px rgba(0,0,0,0.1);
            border-radius: 40px;
        }

        .neumorph-inset {
            background: #e0e5ec;
            box-shadow: inset -5px -5px 10px rgba(255,255,255,0.8), inset 5px 5px 10px rgba(0,0,0,0.1);
            border-radius: 30px;
        }

        .neumorph-btn {
            background: #e0e5ec;
            box-shadow: -5px -5px 10px rgba(255,255,255,0.8), 5px 5px 10px rgba(0,0,0,0.1);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .neumorph-btn:active {
            transform: scale(0.97);
            box-shadow: inset -5px -5px 10px rgba(255,255,255,0.8), inset 5px 5px 10px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            margin-bottom: 30px;
        }

        .logo h2 {
            font-size: 24px;
            font-weight: 600;
            color: #2c3e50;
        }

        .logo p {
            color: #7e8c9e;
            font-size: 12px;
        }

        .logout-btn {
            padding: 10px 25px;
            border-radius: 40px;
            font-weight: 500;
            color: #dc2626;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            padding: 25px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #2c3e50;
            margin-top: 10px;
        }

        .stat-label {
            color: #7e8c9e;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            padding: 8px;
            background: #e0e5ec;
            box-shadow: inset -5px -5px 10px rgba(255,255,255,0.8), inset 5px 5px 10px rgba(0,0,0,0.1);
            border-radius: 60px;
        }

        .tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
            color: #7e8c9e;
        }

        .tab.active {
            background: #e0e5ec;
            box-shadow: -5px -5px 10px rgba(255,255,255,0.8), 5px 5px 10px rgba(0,0,0,0.1);
            color: #2c3e50;
        }

        /* Main Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .panel {
            padding: 30px;
        }

        .panel h3 {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #7e8c9e;
            margin-bottom: 8px;
        }

        select, .question-select {
            width: 100%;
            padding: 14px 18px;
            border: none;
            background: #e0e5ec;
            box-shadow: inset -5px -5px 10px rgba(255,255,255,0.8), inset 5px 5px 10px rgba(0,0,0,0.1);
            border-radius: 30px;
            font-size: 14px;
            color: #2c3e50;
            cursor: pointer;
        }

        .question-item {
            margin-bottom: 15px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn-primary, .btn-secondary {
            flex: 1;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
        }

        .btn-primary {
            background: #e0e5ec;
            color: #2c3e50;
        }

        .btn-secondary {
            background: #e0e5ec;
            color: #7e8c9e;
        }

        .results-area {
            min-height: 350px;
        }

        .result-card {
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 25px;
        }

        .severity-low { background: #d4edda; color: #155724; }
        .severity-medium { background: #fff3cd; color: #856404; }
        .severity-high { background: #f8d7da; color: #721c24; }

        .history-item {
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 25px;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #7e8c9e;
        }

        .empty-state .icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        /* Hide tabs content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .content-grid { grid-template-columns: 1fr; }
            .tabs { flex-wrap: wrap; }
            .tab { flex: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header neumorph">
            <div class="logo">
                <h2>🚗 Bless Auto Care</h2>
                <p>Professional Diagnostic System</p>
            </div>
            <button onclick="logout()" class="logout-btn neumorph-btn">Logout</button>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card neumorph">
                <div class="stat-value" id="statCustomers">0</div>
                <div class="stat-label">CUSTOMERS</div>
            </div>
            <div class="stat-card neumorph">
                <div class="stat-value" id="statVehicles">0</div>
                <div class="stat-label">VEHICLES</div>
            </div>
            <div class="stat-card neumorph">
                <div class="stat-value" id="statDiagnostics">0</div>
                <div class="stat-label">DIAGNOSTICS</div>
            </div>
            <div class="stat-card neumorph">
                <div class="stat-value" id="statRevenue">MK 0</div>
                <div class="stat-label">REVENUE</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('diagnostic')">🔧 Diagnostic</button>
            <button class="tab" onclick="switchTab('vehicles')">🚙 Vehicles</button>
            <button class="tab" onclick="switchTab('history')">📜 History</button>
            <button class="tab" onclick="switchTab('analytics')">📊 Analytics</button>
        </div>

        <!-- Diagnostic Tab -->
        <div id="diagnosticTab" class="tab-content active">
            <div class="content-grid">
                <div class="panel neumorph">
                    <h3>Diagnostic Controls</h3>
                    <div class="form-group">
                        <label>SELECT SYSTEM</label>
                        <select id="systemSelect">
                            <option value="engine">🔧 Engine Diagnostic</option>
                            <option value="battery">🔋 Battery & Charging</option>
                            <option value="starter">⚡ Starter System</option>
                        </select>
                    </div>
                    <div id="questionsPanel"></div>
                    <div class="btn-group">
                        <button onclick="runDiagnostic()" class="btn-primary neumorph-btn">Start Diagnosis</button>
                        <button onclick="cancelDiagnostic()" class="btn-secondary neumorph-btn">Cancel</button>
                    </div>
                </div>

                <div class="panel neumorph">
                    <h3>Analysis Results</h3>
                    <div id="resultsPanel" class="results-area">
                        <div class="empty-state">
                            <div class="icon">🔍</div>
                            <p>Select a system and run diagnosis</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Vehicles Tab -->
        <div id="vehiclesTab" class="tab-content">
            <div class="panel neumorph">
                <div class="empty-state">
                    <div class="icon">🚙</div>
                    <p>No vehicles added yet</p>
                    <button class="btn-primary neumorph-btn" style="margin-top: 20px; padding: 12px 30px;">+ Add Vehicle</button>
                </div>
            </div>
        </div>

        <!-- History Tab -->
        <div id="historyTab" class="tab-content">
            <div class="panel neumorph">
                <div id="historyList" class="results-area">
                    <div class="empty-state">
                        <div class="icon">📜</div>
                        <p>No diagnostic history yet</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Analytics Tab -->
        <div id="analyticsTab" class="tab-content">
            <div class="panel neumorph">
                <div class="empty-state">
                    <div class="icon">📊</div>
                    <p>Analytics coming soon</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let currentSystem = 'engine';
        let isLoading = false;
        let diagnosticHistory = [];

        async function checkAuth() {
            try {
                const res = await fetch(`${API_BASE}/api/check-auth`);
                const data = await res.json();
                if (!data.authenticated) window.location.href = '/login.html';
            } catch(e) { window.location.href = '/login.html'; }
        }

        function switchTab(tabName) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Update content
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(`${tabName}Tab`).classList.add('active');
            
            if (tabName === 'history') loadHistory();
        }

        function loadQuestions() {
            const questions = {
                engine: `
                    <div class="question-item"><label>Engine overheating?</label><select id="q_overheating" class="question-select"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div class="question-item"><label>Smoke from exhaust?</label><select id="q_smoke" class="question-select"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div class="question-item"><label>Unusual engine noise?</label><select id="q_noise" class="question-select"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div class="question-item"><label>Check engine light ON?</label><select id="q_check_light" class="question-select"><option value="no">No</option><option value="yes">Yes</option></select></div>
                `,
                battery: `
                    <div class="question-item"><label>Car fails to start?</label><select id="q_start" class="question-select"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div class="question-item"><label>Dashboard lights dim?</label><select id="q_lights" class="question-select"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div class="question-item"><label>Rapid clicking?</label><select id="q_clicks" class="question-select"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div class="question-item"><label>Battery over 3 years?</label><select id="q_age" class="question-select"><option value="no">No</option><option value="yes">Yes</option></select></div>
                `,
                starter: `
                    <div class="question-item"><label>Clicking when turning key?</label><select id="q_click" class="question-select"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div class="question-item"><label>Engine cranks?</label><select id="q_crank" class="question-select"><option value="no">No</option><option value="yes">Yes</option></select></div>
                    <div class="question-item"><label>Headlights work?</label><select id="q_lights" class="question-select"><option value="yes">Yes</option><option value="no">No</option></select></div>
                    <div class="question-item"><label>Burning smell?</label><select id="q_smell" class="question-select"><option value="no">No</option><option value="yes">Yes</option></select></div>
                `
            };
            document.getElementById('questionsPanel').innerHTML = questions[currentSystem];
        }

        function cancelDiagnostic() {
            if (isLoading) return;
            document.getElementById('resultsPanel').innerHTML = `
                <div class="empty-state">
                    <div class="icon">🔍</div>
                    <p>Select a system and run diagnosis</p>
                </div>
            `;
        }

        async function runDiagnostic() {
            if (isLoading) return;

            const symptoms = {};
            document.querySelectorAll('#questionsPanel select').forEach(input => {
                const key = input.id.replace('q_', '');
                symptoms[key] = input.value;
            });

            const resultsPanel = document.getElementById('resultsPanel');
            isLoading = true;
            resultsPanel.innerHTML = '<div class="empty-state"><div class="spinner"></div><p>Analyzing...</p></div>';

            try {
                const res = await fetch(`${API_BASE}/api/diagnose/${currentSystem}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symptoms })
                });
                const result = await res.json();

                const severityClass = `severity-${result.severity || 'medium'}`;

                // Save to history
                const historyItem = {
                    id: Date.now(),
                    type: currentSystem,
                    date: new Date().toLocaleString(),
                    severity: result.severity,
                    results: result.results
                };
                diagnosticHistory.unshift(historyItem);
                localStorage.setItem('diagnosticHistory', JSON.stringify(diagnosticHistory));

                resultsPanel.innerHTML = `
                    <div class="result-card ${severityClass}">
                        <strong>Severity:</strong> ${result.severity?.toUpperCase() || 'MEDIUM'}
                    </div>
                    <div class="result-card neumorph-inset" style="padding: 15px;">
                        <p>${result.results || 'No issues found'}</p>
                    </div>
                    <div class="btn-group" style="margin-top: 15px;">
                        <button onclick="runDiagnostic()" class="btn-primary neumorph-btn" style="padding: 10px;">Run Again</button>
                        <button onclick="cancelDiagnostic()" class="btn-secondary neumorph-btn" style="padding: 10px;">Clear</button>
                    </div>
                `;
                loadStats();
            } catch(e) {
                resultsPanel.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>Error. Please try again.</p></div>';
            } finally {
                isLoading = false;
            }
        }

        function loadHistory() {
            const saved = localStorage.getItem('diagnosticHistory');
            if (saved) diagnosticHistory = JSON.parse(saved);
            
            const historyDiv = document.getElementById('historyList');
            if (diagnosticHistory.length === 0) {
                historyDiv.innerHTML = '<div class="empty-state"><div class="icon">📜</div><p>No diagnostic history yet</p></div>';
                return;
            }
            
            historyDiv.innerHTML = diagnosticHistory.map(h => `
                <div class="history-item neumorph-inset">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <strong>${h.type.toUpperCase()}</strong>
                        <span style="font-size: 11px; color: #7e8c9e;">${h.date}</span>
                    </div>
                    <p style="font-size: 13px; margin-bottom: 8px;">${h.results.substring(0, 100)}...</p>
                    <span class="severity-${h.severity}" style="padding: 4px 12px; border-radius: 20px; font-size: 11px;">${h.severity}</span>
                </div>
            `).join('');
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API_BASE}/api/statistics`);
                const stats = await res.json();
                document.getElementById('statCustomers').textContent = stats.total_customers || 0;
                document.getElementById('statVehicles').textContent = stats.total_vehicles || 0;
                document.getElementById('statDiagnostics').textContent = stats.total_diagnostics || 0;
                document.getElementById('statRevenue').textContent = `MK ${stats.total_revenue || 0}`;
            } catch(e) {}
        }

        async function logout() {
            await fetch(`${API_BASE}/api/logout`, { method: 'POST' });
            window.location.href = '/login.html';
        }

        document.getElementById('systemSelect').addEventListener('change', (e) => {
            currentSystem = e.target.value;
            loadQuestions();
            cancelDiagnostic();
        });

        checkAuth();
        loadQuestions();
        loadStats();
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
