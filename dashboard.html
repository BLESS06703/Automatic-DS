<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bless Auto Care - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e0e5ec; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; }
        .neumorph { background: #e0e5ec; box-shadow: -10px -10px 20px rgba(255,255,255,0.8), 10px 10px 20px rgba(0,0,0,0.1); border-radius: 40px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; margin-bottom: 30px; }
        .logo h2 { font-size: 24px; color: #003153; }
        .logo h2 i { margin-right: 10px; }
        .logo p { color: #7e8c9e; font-size: 12px; margin-left: 34px; }
        .logout-btn { padding: 10px 25px; border-radius: 40px; background: #e0e5ec; border: none; cursor: pointer; color: #dc2626; font-weight: 500; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { padding: 25px; text-align: center; cursor: pointer; transition: transform 0.2s; }
        .stat-card i { font-size: 32px; color: #003153; margin-bottom: 10px; }
        .stat-value { font-size: 32px; font-weight: 700; color: #003153; }
        .stat-label { color: #7e8c9e; font-size: 11px; text-transform: uppercase; margin-top: 5px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; padding: 8px; background: #e0e5ec; box-shadow: inset -5px -5px 10px rgba(255,255,255,0.8), inset 5px 5px 10px rgba(0,0,0,0.1); border-radius: 60px; }
        .tab { flex: 1; padding: 14px; text-align: center; border: none; background: transparent; cursor: pointer; border-radius: 50px; color: #7e8c9e; font-weight: 500; }
        .tab i { margin-right: 8px; }
        .tab.active { background: #e0e5ec; box-shadow: -5px -5px 10px rgba(255,255,255,0.8), 5px 5px 10px rgba(0,0,0,0.1); color: #003153; }
        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .panel { padding: 30px; }
        .panel h3 { color: #003153; margin-bottom: 20px; }
        select, .question-select { width: 100%; padding: 14px 18px; border: none; background: #e0e5ec; box-shadow: inset -5px -5px 10px rgba(255,255,255,0.8), inset 5px 5px 10px rgba(0,0,0,0.1); border-radius: 30px; }
        .vehicle-selector { margin-bottom: 20px; padding: 15px; background: #f0f2f5; border-radius: 20px; }
        .question-item { margin-bottom: 15px; }
        .btn-group { display: flex; gap: 15px; margin-top: 25px; }
        .btn-primary, .btn-secondary { flex: 1; padding: 14px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; }
        .btn-primary { background: #e0e5ec; color: #003153; }
        .btn-secondary { background: #e0e5ec; color: #7e8c9e; }
        .empty-state { text-align: center; padding: 50px 30px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .vehicle-item { padding: 15px; margin-bottom: 10px; background: #f0f2f5; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: none; border: none; color: #dc2626; cursor: pointer; font-size: 18px; }
        @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .content-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header neumorph">
        <div class="logo"><h2><i class="fas fa-car"></i> Bless Auto Care</h2><p>Professional Diagnostic System</p></div>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card neumorph"><i class="fas fa-users"></i><div class="stat-value" id="statCustomers">0</div><div class="stat-label">Customers</div></div>
        <div class="stat-card neumorph"><i class="fas fa-car"></i><div class="stat-value" id="statVehicles">0</div><div class="stat-label">Vehicles</div></div>
        <div class="stat-card neumorph"><i class="fas fa-stethoscope"></i><div class="stat-value" id="statDiagnostics">0</div><div class="stat-label">Diagnostics</div></div>
        <div class="stat-card neumorph"><i class="fas fa-chart-line"></i><div class="stat-value" id="statRevenue">MK 0</div><div class="stat-label">Revenue</div></div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('diagnostic')"><i class="fas fa-stethoscope"></i> Diagnostic</button>
        <button class="tab" onclick="switchTab('vehicles')"><i class="fas fa-garage"></i> Vehicles</button>
        <button class="tab" onclick="switchTab('history')"><i class="fas fa-history"></i> History</button>
    </div>

    <div id="diagnosticTab" class="tab-content active">
        <div class="content-grid">
            <div class="panel neumorph">
                <h3><i class="fas fa-sliders-h"></i> Diagnostic Controls</h3>
                <div class="vehicle-selector">
                    <label><i class="fas fa-car"></i> SELECT VEHICLE</label>
                    <select id="vehicleSelect"><option value="">-- Select a vehicle --</option></select>
                </div>
                <div class="form-group">
                    <label>SELECT SYSTEM</label>
                    <select id="systemSelect">
                        <option value="engine">Engine Diagnostic</option>
                        <option value="battery">Battery & Charging</option>
                        <option value="starter">Starter System</option>
                    </select>
                </div>
                <div id="questionsPanel"></div>
                <div class="btn-group">
                    <button class="btn-primary" onclick="runDiagnostic()">Start Diagnosis</button>
                    <button class="btn-secondary" onclick="cancelDiagnostic()">Cancel</button>
                </div>
            </div>
            <div class="panel neumorph">
                <h3><i class="fas fa-clipboard-list"></i> Analysis Results</h3>
                <div id="resultsPanel"><div class="empty-state"><i class="fas fa-search"></i><h4>Ready to Diagnose</h4><p>Select a vehicle and run a diagnostic</p></div></div>
            </div>
        </div>
    </div>

    <div id="vehiclesTab" class="tab-content">
        <div class="panel neumorph">
            <div style="margin-bottom:20px;text-align:right"><button class="btn-primary" onclick="showAddVehicleModal()"><i class="fas fa-plus"></i> Add Vehicle</button></div>
            <div id="vehiclesList"></div>
        </div>
    </div>

    <div id="historyTab" class="tab-content">
        <div class="panel neumorph">
            <div style="margin-bottom:20px;text-align:right"><button class="btn-secondary" onclick="clearAllHistory()">Clear All History</button></div>
            <div id="historyList"></div>
        </div>
    </div>
</div>

<script>
const API_BASE = window.location.origin;
let currentSystem = 'engine';
let diagnosticHistory = [];

async function loadVehiclesForSelector() {
    const res = await fetch(`${API_BASE}/api/vehicles`);
    const data = await res.json();
    const select = document.getElementById('vehicleSelect');
    select.innerHTML = '<option value="">-- Select a vehicle --</option>';
    if (data.vehicles) {
        data.vehicles.forEach(v => { select.innerHTML += `<option value="${v.id}">${v.make} ${v.model} (${v.year})</option>`; });
    }
}

function switchTab(tabName) {
    document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById(`${tabName}Tab`).classList.add('active');
    if (tabName === 'vehicles') loadVehicles();
    if (tabName === 'history') loadHistory();
}

function loadQuestions() {
    if (currentSystem === 'engine') {
        document.getElementById('questionsPanel').innerHTML = `
            <div class="question-item"><label>Engine overheating?</label><select id="q_overheating"><option value="no">No</option><option value="yes">Yes</option></select></div>
            <div class="question-item"><label>Smoke from exhaust?</label><select id="q_smoke"><option value="no">No</option><option value="yes">Yes</option></select></div>
            <div class="question-item"><label>Unusual engine noise?</label><select id="q_noise"><option value="no">No</option><option value="yes">Yes</option></select></div>
            <div class="question-item"><label>Check engine light on?</label><select id="q_check_light"><option value="no">No</option><option value="yes">Yes</option></select></div>
        `;
    } else if (currentSystem === 'battery') {
        document.getElementById('questionsPanel').innerHTML = `
            <div class="question-item"><label>Car fails to start?</label><select id="q_start"><option value="no">No</option><option value="yes">Yes</option></select></div>
            <div class="question-item"><label>Dashboard lights dim?</label><select id="q_lights"><option value="no">No</option><option value="yes">Yes</option></select></div>
            <div class="question-item"><label>Rapid clicking?</label><select id="q_clicks"><option value="no">No</option><option value="yes">Yes</option></select></div>
            <div class="question-item"><label>Battery over 3 years?</label><select id="q_age"><option value="no">No</option><option value="yes">Yes</option></select></div>
        `;
    } else if (currentSystem === 'starter') {
        document.getElementById('questionsPanel').innerHTML = `
            <div class="question-item"><label>Clicking when turning key?</label><select id="q_click"><option value="no">No</option><option value="yes">Yes</option></select></div>
            <div class="question-item"><label>Engine cranks?</label><select id="q_crank"><option value="no">No</option><option value="yes">Yes</option></select></div>
            <div class="question-item"><label>Headlights work?</label><select id="q_lights"><option value="yes">Yes</option><option value="no">No</option></select></div>
            <div class="question-item"><label>Burning smell?</label><select id="q_smell"><option value="no">No</option><option value="yes">Yes</option></select></div>
        `;
    }
}

async function runDiagnostic() {
    const symptoms = {};
    document.querySelectorAll('#questionsPanel select').forEach(input => {
        symptoms[input.id.replace('q_', '')] = input.value;
    });
    const vehicleId = document.getElementById('vehicleSelect').value;
    const resultsPanel = document.getElementById('resultsPanel');
    resultsPanel.innerHTML = '<div class="empty-state"><div style="width:40px;height:40px;border:3px solid #003153;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px;"></div><h4>Analyzing...</h4></div>';
    
    const res = await fetch(`${API_BASE}/api/diagnose/${currentSystem}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ symptoms, vehicle_id: vehicleId ? parseInt(vehicleId) : null })
    });
    const result = await res.json();
    
    const severityColor = result.severity === 'high' ? '#f8d7da' : result.severity === 'medium' ? '#fff3cd' : '#d4edda';
    
    // Save to history
    diagnosticHistory.unshift({ id: Date.now(), type: currentSystem, date: new Date().toLocaleString(), results: result.results, severity: result.severity });
    localStorage.setItem('diagnosticHistory', JSON.stringify(diagnosticHistory));
    
    resultsPanel.innerHTML = `
        <div style="padding:15px;border-radius:25px;background:${severityColor};margin-bottom:15px;"><strong>Severity:</strong> ${result.severity}</div>
        <div style="padding:20px;background:#f0f2f5;border-radius:25px;"><p>${result.results}</p></div>
        <div class="btn-group" style="margin-top:20px;"><button class="btn-primary" onclick="runDiagnostic()">Run Again</button><button class="btn-secondary" onclick="cancelDiagnostic()">Clear</button></div>
    `;
    loadStats();
}

function cancelDiagnostic() {
    document.getElementById('resultsPanel').innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><h4>Ready to Diagnose</h4><p>Select a vehicle and run a diagnostic</p></div>';
}

async function loadVehicles() {
    const res = await fetch(`${API_BASE}/api/vehicles`);
    const data = await res.json();
    const vehiclesList = document.getElementById('vehiclesList');
    if (!data.vehicles || data.vehicles.length === 0) {
        vehiclesList.innerHTML = '<div class="empty-state"><i class="fas fa-garage"></i><h4>No Vehicles</h4><p>Add your first vehicle</p></div>';
    } else {
        vehiclesList.innerHTML = data.vehicles.map(v => `
            <div class="vehicle-item"><div><strong>${v.make} ${v.model} (${v.year})</strong><br><small>${v.license_plate || 'No plate'} | ${v.customer_name || 'Walk-in'}</small></div>
            <button class="delete-btn" onclick="deleteVehicle(${v.id})"><i class="fas fa-trash-alt"></i></button></div>
        `).join('');
    }
}

async function deleteVehicle(id) {
    if (confirm('Remove this vehicle?')) {
        await fetch(`${API_BASE}/api/vehicle/${id}`, { method: 'DELETE' });
        loadVehicles();
        loadVehiclesForSelector();
        loadStats();
    }
}

function showAddVehicleModal() {
    const make = prompt('Enter vehicle make:');
    if (!make) return;
    const model = prompt('Enter vehicle model:');
    const year = prompt('Enter year:');
    const license = prompt('License plate (optional):');
    const customer = prompt('Customer name (optional):');
    fetch(`${API_BASE}/api/vehicle/add`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ make, model, year: parseInt(year), license_plate: license || '', customer_name: customer || 'Walk-in Customer' })
    }).then(() => { loadVehicles(); loadVehiclesForSelector(); loadStats(); });
}

function loadHistory() {
    const saved = localStorage.getItem('diagnosticHistory');
    if (saved) diagnosticHistory = JSON.parse(saved);
    const historyDiv = document.getElementById('historyList');
    if (diagnosticHistory.length === 0) {
        historyDiv.innerHTML = '<div class="empty-state"><i class="fas fa-history"></i><h4>No History</h4><p>Run diagnostics to see them here</p></div>';
    } else {
        historyDiv.innerHTML = diagnosticHistory.map(h => `
            <div style="padding:15px;margin-bottom:10px;background:#f0f2f5;border-radius:20px;">
                <div><strong>${h.type.toUpperCase()}</strong> - ${h.date}</div>
                <p>${h.results.substring(0,100)}...</p>
                <button onclick="deleteHistoryItem(${h.id})" style="background:none;border:none;color:#dc2626;margin-top:8px;">Delete</button>
            </div>
        `).join('');
    }
}

function deleteHistoryItem(id) {
    diagnosticHistory = diagnosticHistory.filter(item => item.id !== id);
    localStorage.setItem('diagnosticHistory', JSON.stringify(diagnosticHistory));
    loadHistory();
    loadStats();
}

function clearAllHistory() {
    if (confirm('Delete all history?')) {
        diagnosticHistory = [];
        localStorage.setItem('diagnosticHistory', JSON.stringify(diagnosticHistory));
        loadHistory();
        loadStats();
    }
}

async function loadStats() {
    const res = await fetch(`${API_BASE}/api/statistics`);
    const stats = await res.json();
    document.getElementById('statCustomers').textContent = stats.total_customers || 0;
    document.getElementById('statVehicles').textContent = stats.total_vehicles || 0;
    document.getElementById('statDiagnostics').textContent = stats.total_diagnostics || 0;
    document.getElementById('statRevenue').textContent = `MK ${stats.total_revenue || 0}`;
}

async function logout() { window.location.href = '/login.html'; }

document.getElementById('systemSelect').addEventListener('change', (e) => { currentSystem = e.target.value; loadQuestions(); });

loadVehiclesForSelector();
loadQuestions();
loadStats();
loadHistory();
setInterval(loadStats, 30000);
</script>
</body>
</html>
