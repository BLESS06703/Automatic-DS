<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bless Auto Care - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #e0e5ec;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Neumorphism Effect */
        .neumorph {
            background: #e0e5ec;
            box-shadow: -10px -10px 20px rgba(255,255,255,0.8), 10px 10px 20px rgba(0,0,0,0.1);
            border-radius: 50px;
        }

        .neumorph-inset {
            background: #e0e5ec;
            box-shadow: inset -5px -5px 10px rgba(255,255,255,0.8), inset 5px 5px 10px rgba(0,0,0,0.1);
            border-radius: 30px;
        }

        .neumorph-btn {
            background: #e0e5ec;
            box-shadow: -5px -5px 10px rgba(255,255,255,0.8), 5px 5px 10px rgba(0,0,0,0.1);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .neumorph-btn:active {
            transform: scale(0.97);
            box-shadow: inset -5px -5px 10px rgba(255,255,255,0.8), inset 5px 5px 10px rgba(0,0,0,0.1);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
        }

        .logo-icon {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-icon i {
            font-size: 70px;
            color: #003153;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            color: #003153;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #7e8c9e;
            font-size: 14px;
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group i {
            position: absolute;
            margin: 18px 20px;
            color: #003153;
            font-size: 16px;
        }

        .input-field {
            width: 100%;
            padding: 18px 20px 18px 50px;
            font-size: 16px;
            border: none;
            background: #e0e5ec;
            box-shadow: inset -5px -5px 10px rgba(255,255,255,0.8), inset 5px 5px 10px rgba(0,0,0,0.1);
            border-radius: 40px;
            color: #2c3e50;
            font-weight: 500;
        }

        .input-field:focus {
            outline: none;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 40px;
            margin-top: 10px;
            color: #003153;
        }

        .login-btn i {
            margin-right: 8px;
        }

        .demo-card {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
        }

        .demo-card p {
            color: #7e8c9e;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .demo-badge {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .demo-chip {
            padding: 8px 20px;
            background: #e0e5ec;
            box-shadow: -3px -3px 6px rgba(255,255,255,0.8), 3px 3px 6px rgba(0,0,0,0.1);
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: #003153;
        }

        .demo-chip i {
            margin-right: 6px;
            font-size: 12px;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 30px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-container {
            animation: fadeIn 0.6s ease-out;
        }
    </style>
</head>
<body>
    <div class="login-container neumorph">
        <div class="logo-icon">
            <i class="fas fa-car"></i>
        </div>
        <h1>Bless Auto Care</h1>
        <div class="subtitle">Professional Diagnostic System</div>

        <div id="errorMsg" class="error-message"></div>

        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="loginUsername" class="input-field" placeholder="Username" autocomplete="off">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="loginPassword" class="input-field" placeholder="Password">
        </div>

        <button onclick="handleLogin()" class="login-btn neumorph-btn">
            <i class="fas fa-sign-in-alt"></i> Sign In
        </button>

        <div class="demo-card neumorph-inset">
            <p><i class="fas fa-flask"></i> Try it out with demo credentials</p>
            <div class="demo-badge">
                <span class="demo-chip"><i class="fas fa-user"></i> admin</span>
                <span class="demo-chip"><i class="fas fa-key"></i> admin123</span>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('errorMsg');
            
            errorDiv.style.display = 'none';
            
            if (!username || !password) {
                errorDiv.textContent = 'Please enter both username and password';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/dashboard.html';
                } else {
                    errorDiv.textContent = 'Invalid username or password. Try admin/admin123';
                    errorDiv.style.display = 'block';
                }
            } catch(e) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
