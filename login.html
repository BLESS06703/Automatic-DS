<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bless Auto Care - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #e0e5ec 0%, #f0f4f8 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Neumorphism Effect */
        .neumorph {
            background: #e0e5ec;
            box-shadow: 9px 9px 16px #a3b1c6, -9px -9px 16px #ffffff;
            border-radius: 40px;
        }

        .neumorph-inset {
            background: #e0e5ec;
            box-shadow: inset 5px 5px 10px #a3b1c6, inset -5px -5px 10px #ffffff;
            border-radius: 30px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            font-size: 70px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 10px;
        }

        .subtitle {
            color: #8e9aaf;
            font-size: 14px;
            margin-top: 8px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            color: #6b7a8f;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            margin-left: 10px;
        }

        .input-field {
            width: 100%;
            padding: 18px 20px;
            font-size: 16px;
            border: none;
            background: #e0e5ec;
            box-shadow: inset 5px 5px 10px #a3b1c6, inset -5px -5px 10px #ffffff;
            border-radius: 30px;
            color: #2c3e50;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            box-shadow: inset 3px 3px 8px #a3b1c6, inset -3px -3px 8px #ffffff;
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 9px 9px 16px #a3b1c6, -9px -9px 16px #ffffff;
        }

        .login-btn:active {
            transform: scale(0.98);
            box-shadow: inset 5px 5px 10px #a3b1c6, inset -5px -5px 10px #ffffff;
        }

        .demo-card {
            margin-top: 30px;
            padding: 20px;
            text-align: center;
        }

        .demo-card p {
            color: #6b7a8f;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .demo-badge {
            display: inline-block;
            padding: 8px 16px;
            margin: 0 5px;
            background: #e0e5ec;
            box-shadow: 5px 5px 10px #a3b1c6, -5px -5px 10px #ffffff;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 30px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-container {
            animation: fadeIn 0.6s ease-out;
        }
    </style>
</head>
<body>
    <div class="login-container neumorph">
        <div class="logo">
            <div class="logo-icon">🚗</div>
            <h1>Bless Auto Care</h1>
            <div class="subtitle">Professional Diagnostic System</div>
        </div>

        <div id="errorMsg" class="error-message"></div>

        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" class="input-field" placeholder="Enter username" autocomplete="off">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" class="input-field" placeholder="Enter password">
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="demo-card neumorph">
            <p>Demo Credentials</p>
            <span class="demo-badge">admin</span>
            <span class="demo-badge">admin123</span>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            
            errorDiv.style.display = 'none';
            
            try {
                const response = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/web_interface.html';
                } else {
                    errorDiv.textContent = data.message || 'Invalid credentials';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
