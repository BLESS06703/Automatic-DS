<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bless Auto Care - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .bottom-line-input {
            border: none;
            border-bottom: 2px solid #e2e8f0;
            transition: all 0.3s ease;
            background: transparent;
            font-size: 16px;
            padding: 12px 4px;
            width: 100%;
        }
        .bottom-line-input:focus {
            outline: none;
            border-bottom-color: #003153;
        }
    </style>
</head>
<body style="background: #003153;" class="flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="p-8">
                <div class="mb-8 text-center">
                    <div class="text-5xl mb-3">🚗</div>
                    <h2 class="text-2xl font-bold text-[#003153]">Bless Auto Care</h2>
                    <p class="text-gray-500 text-sm mt-1">Professional Diagnostic System</p>
                </div>
                <div class="space-y-6">
                    <div>
                        <input type="text" id="loginUsername" placeholder="Username" class="bottom-line-input">
                    </div>
                    <div>
                        <input type="password" id="loginPassword" placeholder="Password" class="bottom-line-input">
                    </div>
                    <button onclick="handleLogin()" class="w-full bg-[#003153] text-white py-3 rounded-lg font-semibold hover:bg-[#1B4F72] transition">Sign In</button>
                </div>
                <div class="mt-6 pt-4 border-t border-gray-200 text-center">
                    <p class="text-xs text-gray-500">Demo: <strong class="text-[#003153]">admin</strong> / <strong class="text-[#003153]">admin123</strong></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        async function handleLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const res = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) window.location.href = '/dashboard.html';
                else alert('Invalid credentials');
            } catch(e) { alert('Login failed'); }
        }
    </script>
</body>
</html>
