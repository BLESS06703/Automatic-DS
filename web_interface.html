<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bless Auto Care - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e0e5ec 0%, #f0f4f8 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        /* Neumorphism Classes */
        .neumorph {
            background: #e0e5ec;
            box-shadow: 9px 9px 16px #a3b1c6, -9px -9px 16px #ffffff;
            border-radius: 30px;
        }

        .neumorph-inset {
            background: #e0e5ec;
            box-shadow: inset 5px 5px 10px #a3b1c6, inset -5px -5px 10px #ffffff;
            border-radius: 25px;
        }

        .neumorph-btn {
            background: #e0e5ec;
            box-shadow: 5px 5px 10px #a3b1c6, -5px -5px 10px #ffffff;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .neumorph-btn:active {
            transform: scale(0.97);
            box-shadow: inset 5px 5px 10px #a3b1c6, inset -5px -5px 10px #ffffff;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            margin-bottom: 30px;
        }

        .logo h2 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            color: #8e9aaf;
            font-size: 12px;
        }

        .logout-btn {
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 600;
            color: #dc2626;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            padding: 25px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 35px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #2c3e50;
            margin-top: 10px;
        }

        .stat-label {
            color: #8e9aaf;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Diagnostic Sections */
        .diagnostic-section {
            margin-bottom: 25px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .section-header {
            padding: 20px 30px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header h3 {
            font-size: 20px;
            font-weight: 700;
            color: #2c3e50;
        }

        .section-arrow {
            font-size: 24px;
            transition: transform 0.3s ease;
            color: #667eea;
        }

        .section-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .section-content.active {
            max-height: 500px;
        }

        .questions-panel {
            padding: 20px 30px 30px;
        }

        .question-row {
            margin-bottom: 20px;
        }

        .question-row label {
            display: block;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 10px;
        }

        select, input {
            width: 100%;
            padding: 14px 18px;
            border: none;
            background: #e0e5ec;
            box-shadow: inset 3px 3px 8px #a3b1c6, inset -3px -3px 8px #ffffff;
            border-radius: 25px;
            font-size: 14px;
            color: #2c3e50;
            font-family: inherit;
            cursor: pointer;
        }

        select:focus, input:focus {
            outline: none;
        }

        .run-btn {
            width: 100%;
            padding: 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-top: 10px;
        }

        /* Results Panel */
        .results-panel {
            padding: 25px;
            margin-top: 20px;
        }

        .severity-badge {
            display: inline-block;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
        }

        .severity-low { background: #10b981; color: white; }
        .severity-medium { background: #f59e0b; color: white; }
        .severity-high { background: #ef4444; color: white; }
        .severity-critical { background: #8b5cf6; color: white; }

        .result-block {
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 20px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            text-align: center;
            cursor: pointer;
            min-width: 100px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 30px;
        }

        /* Loading Spinner */
        .spinner {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #e0e5ec;
            box-shadow: inset 5px 5px 10px #a3b1c6, inset -5px -5px 10px #ffffff;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-overlay {
            text-align: center;
            padding: 40px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 50px;
            background: #2c3e50;
            color: white;
            font-weight: 500;
            z-index: 1100;
            animation: slideIn 0.3s ease;
            display: none;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            body { padding: 15px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .stat-card { padding: 15px; }
            .stat-value { font-size: 24px; }
            .action-buttons { flex-direction: column; }
            .action-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header neumorph">
        <div class="logo">
            <h2>🚗 Bless Auto Care</h2>
            <p>Professional Diagnostic System</p>
        </div>
        <button class="neumorph-btn logout-btn" onclick="logout()">Logout</button>
    </div>

    <!-- Stats Dashboard -->
    <div class="stats-grid">
        <div class="stat-card neumorph">
            <div class="stat-icon">👥</div>
            <div class="stat-value" id="statCustomers">0</div>
            <div class="stat-label">Customers</div>
        </div>
        <div class="stat-card neumorph">
            <div class="stat-icon">🚙</div>
            <div class="stat-value" id="statVehicles">0</div>
            <div class="stat-label">Vehicles</div>
        </div>
        <div class="stat-card neumorph">
            <div class="stat-icon">🔧</div>
            <div class="stat-value" id="statDiagnostics">0</div>
            <div class="stat-label">Diagnostics</div>
        </div>
        <div class="stat-card neumorph">
            <div class="stat-icon">💰</div>
            <div class="stat-value" id="statRevenue">$0</div>
            <div class="stat-label">Revenue</div>
        </div>
    </div>

    <!-- Engine Section -->
    <div class="diagnostic-section neumorph">
        <div class="section-header" onclick="toggleSection('engineSection')">
            <h3>🔧 Engine Diagnostic</h3>
            <span class="section-arrow" id="engineArrow">▼</span>
        </div>
        <div id="engineSection" class="section-content">
            <div class="questions-panel">
                <div class="question-row"><label>Is the engine overheating?</label><select id="engine_overheating"><option value="no">No</option><option value="yes">Yes</option></select></div>
                <div class="question-row"><label>Is there smoke from exhaust?</label><select id="engine_smoke"><option value="no">No</option><option value="yes">Yes</option></select></div>
                <div class="question-row"><label>Any unusual engine noise?</label><select id="engine_noise"><option value="no">No</option><option value="yes">Yes</option></select></div>
                <div class="question-row"><label>Is check engine light ON?</label><select id="engine_check_light"><option value="no">No</option><option value="yes">Yes</option></select></div>
                <button class="neumorph-btn run-btn" onclick="runDiagnostic('engine')">Run Diagnostic</button>
            </div>
        </div>
    </div>

    <!-- Battery Section -->
    <div class="diagnostic-section neumorph">
        <div class="section-header" onclick="toggleSection('batterySection')">
            <h3>🔋 Battery & Charging</h3>
            <span class="section-arrow" id="batteryArrow">▼</span>
        </div>
        <div id="batterySection" class="section-content">
            <div class="questions-panel">
                <div class="question-row"><label>Does the car fail to start?</label><select id="battery_start"><option value="no">No</option><option value="yes">Yes</option></select></div>
                <div class="question-row"><label>Are dashboard lights dim?</label><select id="battery_lights"><option value="no">No</option><option value="yes">Yes</option></select></div>
                <div class="question-row"><label>Do you hear rapid clicking?</label><select id="battery_clicks"><option value="no">No</option><option value="yes">Yes</option></select></div>
                <div class="question-row"><label>Is battery more than 3 years old?</label><select id="battery_age"><option value="no">No</option><option value="yes">Yes</option></select></div>
                <button class="neumorph-btn run-btn" onclick="runDiagnostic('battery')">Run Diagnostic</button>
            </div>
        </div>
    </div>

    <!-- Starter Section -->
    <div class="diagnostic-section neumorph">
        <div class="section-header" onclick="toggleSection('starterSection')">
            <h3>⚡ Starter System</h3>
            <span class="section-arrow" id="starterArrow">▼</span>
        </div>
        <div id="starterSection" class="section-content">
            <div class="questions-panel">
                <div class="question-row"><label>Do you hear clicking when turning key?</label><select id="starter_click"><option value="no">No</option><option value="yes">Yes</option></select></div>
                <div class="question-row"><label>Does the engine crank at all?</label><select id="starter_crank"><option value="no">No</option><option value="yes">Yes</option></select></div>
                <div class="question-row"><label>Do headlights work?</label><select id="starter_lights"><option value="yes">Yes</option><option value="no">No</option></select></div>
                <div class="question-row"><label>Any burning smell?</label><select id="starter_smell"><option value="no">No</option><option value="yes">Yes</option></select></div>
                <button class="neumorph-btn run-btn" onclick="runDiagnostic('starter')">Run Diagnostic</button>
            </div>
        </div>
    </div>

    <!-- Results Panel -->
    <div id="resultsPanel" class="neumorph results-panel" style="display: none;">
        <h3 style="margin-bottom: 15px;">📊 Diagnosis Results</h3>
        <div id="resultsContent"></div>
        <div class="action-buttons">
            <button class="neumorph-btn action-btn" onclick="generateReport()">📄 Report</button>
            <button class="neumorph-btn action-btn" onclick="sendEmail()">📧 Email</button>
            <button class="neumorph-btn action-btn" onclick="sendSMS()">📱 SMS</button>
            <button class="neumorph-btn action-btn" onclick="generateQR()">🔲 QR</button>
            <button class="neumorph-btn action-btn" onclick="closeResults()">Close</button>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading" class="neumorph" style="display: none; margin-top: 20px;">
        <div class="loading-overlay">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #8e9aaf;">Analyzing symptoms...</p>
        </div>
    </div>

    <!-- Analytics Modal -->
    <div id="analyticsModal" class="modal">
        <div class="modal-content neumorph">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>📊 Analytics Dashboard</h3>
                <button onclick="closeModal('analyticsModal')" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
            </div>
            <div id="analyticsContent">Loading...</div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script>
        const API_BASE = window.location.origin;
        let currentResults = null;
        let activeDiagnostic = null;

        async function apiCall(endpoint, options = {}) {
            const res = await fetch(API_BASE + endpoint, options);
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        async function checkAuth() {
            try {
                const data = await apiCall('/api/check-auth');
                if (!data.authenticated) window.location.href = '/login.html';
            } catch(e) { window.location.href = '/login.html'; }
        }

        async function logout() {
            await fetch(API_BASE + '/api/logout', { method: 'POST' });
            window.location.href = '/login.html';
        }

        async function loadStats() {
            try {
                const stats = await apiCall('/api/statistics');
                document.getElementById('statCustomers').textContent = stats.total_customers || 0;
                document.getElementById('statVehicles').textContent = stats.total_vehicles || 0;
                document.getElementById('statDiagnostics').textContent = stats.total_diagnostics || 0;
                document.getElementById('statRevenue').textContent = `$${stats.total_revenue || 0}`;
            } catch(e) { console.log('Stats not available'); }
        }

        function toggleSection(sectionId) {
            const content = document.getElementById(sectionId);
            const arrow = document.getElementById(sectionId.replace('Section', 'Arrow'));
            content.classList.toggle('active');
            arrow.style.transform = content.classList.contains('active') ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        async function runDiagnostic(type) {
            const symptoms = {};
            const prefix = type + '_';
            document.querySelectorAll(`[id^="${prefix}"]`).forEach(el => {
                symptoms[el.id.replace(prefix, '')] = el.value;
            });

            document.getElementById('resultsPanel').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            try {
                const result = await apiCall(`/api/diagnose/${type}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symptoms })
                });

                currentResults = result;
                displayResults(result);
                showToast('Diagnostic completed!');
                loadStats();
            } catch(e) {
                showToast('Error running diagnostic');
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function displayResults(result) {
            const severityClass = `severity-${result.severity || 'medium'}`;
            let toolsHtml = result.tools?.length ? `<div class="result-block neumorph-inset"><strong>🛠️ Tools Required</strong><ul style="margin-top: 10px; margin-left: 20px;">${result.tools.map(t => `<li>${t}</li>`).join('')}</ul></div>` : '';
            let actionHtml = result.action_plan?.length ? `<div class="result-block neumorph-inset"><strong>📋 Action Plan</strong><ol style="margin-top: 10px; margin-left: 20px;">${result.action_plan.map(s => `<li>${s}</li>`).join('')}</ol></div>` : '';

            document.getElementById('resultsContent').innerHTML = `
                <div class="result-block neumorph-inset"><strong>⚠️ Severity</strong><br><span class="severity-badge ${severityClass}">${result.severity?.toUpperCase() || 'MEDIUM'}</span></div>
                <div class="result-block neumorph-inset"><strong>🔍 Symptoms Found</strong><ul style="margin-top: 10px; margin-left: 20px;">${result.symptoms?.map(s => `<li>${s}</li>`).join('') || '<li>No symptoms recorded</li>'}</ul></div>
                <div class="result-block neumorph-inset"><strong>📊 Analysis</strong><p style="margin-top: 10px;">${result.results || 'No issues found'}</p></div>
                ${toolsHtml}${actionHtml}
            `;
            document.getElementById('resultsPanel').style.display = 'block';
            document.getElementById('resultsPanel').scrollIntoView({ behavior: 'smooth' });
        }

        function generateReport() { showToast('📄 Report generation coming soon'); }
        function sendEmail() { showToast('📧 Email feature coming soon'); }
        function sendSMS() { showToast('📱 SMS feature coming soon'); }
        function generateQR() { showToast('🔲 QR code generation coming soon'); }
        function closeResults() { document.getElementById('resultsPanel').style.display = 'none'; currentResults = null; }

        async function showAnalytics() {
            document.getElementById('analyticsContent').innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';
            document.getElementById('analyticsModal').style.display = 'flex';
            try {
                const analytics = await apiCall('/api/analytics/dashboard');
                document.getElementById('analyticsContent').innerHTML = `
                    <div class="result-block neumorph-inset"><strong>📈 Today's Summary</strong><br>Diagnostics: ${analytics.daily?.today_diagnostics || 0}<br>Revenue: $${analytics.daily?.today_revenue || 0}</div>
                    <div class="result-block neumorph-inset"><strong>🔧 Common Issues</strong><br>${analytics.daily?.common_issues?.map(i => `${i.type}: ${i.count}`).join('<br>') || 'No data yet'}</div>
                    <div class="result-block neumorph-inset"><strong>👨‍🔧 Technician Performance</strong><br>${analytics.technician_performance?.map(t => `${t.technician}: ${t.diagnostics} jobs`).join('<br>') || 'No data yet'}</div>
                `;
            } catch(e) { document.getElementById('analyticsContent').innerHTML = '<div class="result-block neumorph-inset">Analytics data coming soon</div>'; }
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function showToast(msg) { 
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        // Add analytics button to header
        document.querySelector('.stats-grid').insertAdjacentHTML('afterend', `
            <div style="display: flex; gap: 12px; margin-bottom: 25px;">
                <button class="neumorph-btn action-btn" onclick="showAnalytics()" style="flex:1">📊 Analytics</button>
                <button class="neumorph-btn action-btn" onclick="location.reload()" style="flex:1">🔄 Refresh</button>
            </div>
        `);

        checkAuth();
        loadStats();
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
